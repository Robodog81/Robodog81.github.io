<!DOCTYPE HTML>
<html lang=en>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="UTF-8">
	<title>Meshtastic Image Encoder</title>
	<script src="compresser.js"></script>
	<link rel="stylesheet" type="text/css" href="styles.css">
	<h1>Meshcoder</h1>
</head>
<body>
<canvas id="myCanvas" width="300" height="300" style="border:1px solid #000000;">
Your browser does not support the canvas element.
</canvas>
<h3 id = "helperText">This text will change as the program runs</h3>
<input type="file" id="imageInput" accept="image/*">
<br>
<span id="THT">Conversion threshold: </span>
<input type="range" min="0" max="255" value="128" id="threshold">
<br>
<button id="encodeButton" onclick="finishEncode()">Encode Image</button>
<br><br>
<button id="decodeButton" onclick="decode()">Decode Image</button>
</body>
</html>
